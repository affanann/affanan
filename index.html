<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AFFAN MADLEY</title>

<!-- 🔥 TITLE GLITCH EFFECT -->
<script>
(() => {
  const baseTitle = "AFFAN MADLEY";
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@$#%&*<>/\\|";
  let frame = 0;

  function glitchTitle() {
    const progress = frame % 40;

    if (progress < baseTitle.length) {
      document.title = baseTitle
        .split("")
        .map((char, i) => {
          if (char === " ") return " ";
          if (i < progress) return char;
          return chars[Math.floor(Math.random() * chars.length)];
        })
        .join("");
    } 
    else if (progress < 28) {
      document.title = baseTitle;
    } 
    else {
      document.title = baseTitle
        .split("")
        .map(char => {
          if (char === " ") return " ";
          return Math.random() > 0.7
            ? chars[Math.floor(Math.random() * chars.length)]
            : char;
        })
        .join("");
    }

    frame++;
  }

  setInterval(glitchTitle, 90);
})();
</script>

<style>
:root{
--cream:#EDE0C8;
--cream-dark:#D4BFA0;
--brown:#3B1F0A;
--brown-mid:#6B3A1F;
--brown-faint:rgba(59,31,10,.13);
--fs:5rem;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
background:var(--cream);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

.stage{
display:flex;
align-items:center;
justify-content:center;
}

.char{
font-family:"Fredoka",sans-serif;
font-weight:700;
font-size:5rem;
letter-spacing:.05em;
color:var(--brown);
opacity:0;
transform:translateY(10px);
animation:fadeIn .5s forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="stage" id="text"></div>

<script>
const text = "AFFAN MADLEY";
const container = document.getElementById("text");

text.split("").forEach((char, i) => {
  const span = document.createElement("span");
  span.className = "char";
  span.textContent = char;
  span.style.animationDelay = i * 0.1 + "s";
  container.appendChild(span);
});
</script>

</body>
</html>
